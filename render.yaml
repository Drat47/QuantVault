services:
  - type: web
    name: quantvault-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        value: https://your-vercel-url.vercel.app  # Update after Vercel deployment
    healthCheckPath: /
